# logpulse example configuration

log_path = "/var/log/myapp/app.log"
poll_interval = 1.0
checkpoint_path = "/var/lib/logpulse/checkpoint.json"

# ── Enrichment ────────────────────────────────────────────────────────────────
[enrich]
include_hostname  = true
include_timestamp = true

[enrich.static_tags]
env    = "production"
region = "us-east-1"
app    = "myapp"

# ── Patterns ──────────────────────────────────────────────────────────────────
[[patterns]]
label    = "error"
regex    = "(?i)error|exception|traceback"
severity = "critical"

[[patterns]]
label    = "warning"
regex    = "(?i)warn"
severity = "warning"

[patterns.sampler]
every_nth = 5

[[patterns]]
label    = "oom"
regex    = "Out of memory"
severity = "critical"

# ── Notifiers ─────────────────────────────────────────────────────────────────
[[notifiers]]
url     = "${SLACK_WEBHOOK_URL}"
timeout = 10.0

[[notifiers]]
url     = "https://alerting.internal/webhook"
timeout = 5.0
